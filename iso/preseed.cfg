#### Localization
d-i debian-installer/locale string en_US.UTF-8
d-i keyboard-configuration/xkb-keymap select us
d-i keyboard-configuration/layoutcode string us

#### Network configuration
d-i netcfg/choose_interface select auto
d-i netcfg/dhcp_timeout string 60
d-i netcfg/get_hostname string debtorchy
d-i netcfg/get_domain string unassigned-domain

#### Mirror settings
d-i mirror/country string US
d-i mirror/http/mirror select http.us.debian.org
d-i mirror/http/directory string /debian
d-i mirror/http/proxy string

#### Clock and time zone
d-i time/zone string Europe/Vilnius
d-i clock-setup/utc boolean true
d-i clock-setup/ntp boolean true

#### Partitioning
d-i partman-auto/method string regular
d-i partman-auto/choose_recipe select atomic
d-i partman-partitioning/confirm_write_new_label boolean true
d-i partman/choose_partition select finish
d-i partman/confirm boolean true
d-i partman/confirm_nooverwrite boolean true

#### Base system
d-i base-installer/install-recommends boolean false

#### Account setup
d-i passwd/root-login boolean true
d-i passwd/root-password password admin
d-i passwd/root-password-again password admin
d-i passwd/make-user boolean true
d-i passwd/user-fullname string pc
d-i passwd/username string pc
d-i passwd/user-password password admin
d-i passwd/user-password-again password admin

#### Package selection — bare minimum, no extras
tasksel tasksel/first multiselect
d-i pkgsel/run_tasksel boolean false
d-i pkgsel/include string

#### Boot loader
d-i grub-installer/only_debian boolean true
d-i grub-installer/bootdev string default

#### Post-install: copy os-provision/ from ISO to disk
d-i preseed/late_command string \
    mkdir -p /target/home/pc/repos/Debtorchy; \
    cp -a /cdrom/os-provision /target/home/pc/repos/Debtorchy/os-provision

#### Finish
d-i finish-install/reboot_in_progress note
