backend = "glx";
vsync = true;

corner-radius = 8;

opacity-rule = [
    "100:class_g = 'Alacritty' && focused",
    "95:class_g = 'Alacritty' && !focused",
    "100:class_g = 'Polybar'",
    "100:class_g = 'i3bar'"
];

shadow = true;
shadow-offset-x = -15;
shadow-offset-y = -15;
shadow-radius = 20;
shadow-opacity = 0.5;
shadow-exclude = [
    "class_g = 'i3bar'",
    "class_g = 'Polybar'",
    "window_type = 'dock'",
    "window_type = 'desktop'"
];

blur-background = false;
blur-kern = "3x3box";

focus-exclude = [
    "class_g = 'Cario-clock'"
];

mark-ovredir-focused = false;

wintypes:
{
    tooltip = { fade-in = true; fade-out = true; fade-time-step = 33; fade-exclude = []; };
    notification = { opacity = 100; };
    dock = { shadow = false; };
    desktop = { shadow = false; };
};
